<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif">
  <rect width="1080" height="1920" fill="#FFFFFF"/>

  <!-- Status bar -->
  <text x="80" y="55" font-size="34" font-weight="600" fill="#000000">9:41</text>

  <!-- Navbar -->
  <rect x="0" y="80" width="1080" height="170" fill="#FFFFFF"/>
  <rect x="0" y="248" width="1080" height="2" fill="#E5E5EA"/>
  <circle cx="80" cy="165" r="46" fill="#8E8E93"/>
  <g transform="translate(420, 110)">
    <circle cx="32" cy="50" r="32" fill="#0A0A0A"/>
    <path fill="#C83C3C" fill-rule="evenodd" transform="translate(32, 50) scale(0.13) translate(-256, -256)" d="
      M 120 92 H 200 V 420 H 120 Z
      M 200 92 A 100 100 0 0 1 200 292 Z
      M 200 286 L 292 286 L 428 420 L 336 420 Z
      M 200 154 A 38 38 0 0 1 200 230 Z
    "/>
    <text x="86" y="50" font-size="36" font-weight="700" fill="#000000">Relay</text>
    <rect x="208" y="22" width="64" height="22" rx="4" fill="#C83C3C"/>
    <text x="240" y="40" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">BETA</text>
    <text x="86" y="86" font-size="20" font-weight="500" fill="#8E8E93">Pin to Pin Messenger</text>
  </g>

  <!-- Big title -->
  <text x="60" y="370" font-size="84" font-weight="800" fill="#000000" letter-spacing="-2">Updates</text>

  <!-- NHL card -->
  <g transform="translate(60, 440)">
    <rect x="0" y="0" width="960" height="280" rx="22" fill="#FFFFFF" stroke="#E5E5EA" stroke-width="2"/>
    <rect x="30" y="30" width="100" height="46" rx="23" fill="#AF1E2D"/>
    <text x="80" y="62" font-size="22" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="3">NHL</text>
    <!-- LIVE -->
    <circle cx="170" cy="52" r="10" fill="#FF3B30"/>
    <text x="200" y="62" font-size="22" font-weight="800" fill="#FF3B30" letter-spacing="2">LIVE</text>
    <text x="930" y="62" font-size="24" font-weight="700" fill="#6E6E73" text-anchor="end">2nd 8:45</text>

    <!-- Toronto row (AWAY) -->
    <circle cx="60" cy="140" r="28" fill="#003E7E"/>
    <text x="60" y="152" font-size="22" font-weight="800" fill="#FFFFFF" text-anchor="middle">TOR</text>
    <text x="110" y="150" font-size="28" font-weight="500" fill="#000000">Toronto Maple Leafs</text>
    <text x="880" y="150" font-size="40" font-weight="800" fill="#000000" text-anchor="end">1</text>

    <!-- Montreal row (HOME, OURS) -->
    <circle cx="60" cy="210" r="28" fill="#AF1E2D"/>
    <text x="60" y="222" font-size="22" font-weight="800" fill="#FFFFFF" text-anchor="middle">MTL</text>
    <text x="110" y="220" font-size="28" font-weight="700" fill="#000000">Montreal Canadiens</text>
    <text x="430" y="220" font-size="18" font-weight="600" fill="#6E6E73">HOME</text>
    <text x="880" y="220" font-size="40" font-weight="800" fill="#000000" text-anchor="end">2</text>

    <text x="30" y="270" font-size="18" font-weight="400" fill="#6E6E73">Bell Centre</text>
  </g>

  <!-- Status list header -->
  <text x="60" y="800" font-size="24" font-weight="400" fill="#6E6E73">Set your own status from Profile.</text>

  <g transform="translate(60, 830)">
    <rect x="0" y="0" width="960" height="500" rx="22" fill="#FFFFFF" stroke="#E5E5EA" stroke-width="2"/>

    <!-- Me -->
    <circle cx="80" cy="80" r="40" fill="#5856D6"/>
    <text x="80" y="96" font-size="36" font-weight="700" fill="#FFFFFF" text-anchor="middle">C</text>
    <text x="150" y="75" font-size="30" font-weight="700" fill="#000000">Claude <tspan font-weight="400" fill="#6E6E73">(you)</tspan></text>
    <text x="150" y="115" font-size="26" font-weight="400" fill="#6E6E73">Vibing</text>
    <line x1="60" y1="160" x2="900" y2="160" stroke="#E5E5EA" stroke-width="2"/>

    <!-- Matthew -->
    <circle cx="80" cy="240" r="40" fill="#FFCC00"/>
    <text x="80" y="256" font-size="36" font-weight="700" fill="#FFFFFF" text-anchor="middle">M</text>
    <text x="150" y="235" font-size="30" font-weight="700" fill="#000000">Matthew</text>
    <text x="150" y="275" font-size="26" font-weight="400" fill="#6E6E73">Working from the cottage 🛶</text>
    <line x1="60" y1="320" x2="900" y2="320" stroke="#E5E5EA" stroke-width="2"/>

    <!-- Jewlz -->
    <circle cx="80" cy="400" r="40" fill="#00C7BE"/>
    <text x="80" y="416" font-size="36" font-weight="700" fill="#FFFFFF" text-anchor="middle">J</text>
    <text x="150" y="395" font-size="30" font-weight="700" fill="#000000">Jewlz</text>
    <text x="150" y="435" font-size="26" font-weight="400" fill="#6E6E73">In the lab 🧪</text>
  </g>

  <!-- Caption -->
  <text x="540" y="1820" font-size="42" font-weight="700" fill="#000000" text-anchor="middle">Live scores + statuses.</text>
  <text x="540" y="1880" font-size="32" font-weight="400" fill="#6E6E73" text-anchor="middle">Habs and Jays push when they score.</text>
</svg>
