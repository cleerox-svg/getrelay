name: Build Android APK / AAB

# Manual trigger. Produces:
#   - Debug APK (no signing required) — sideloadable for testing
#   - Signed release AAB — what you upload to Play Console
#
# Signed releases need these repository Secrets (generated once via the
# "Initialize Android upload keystore" workflow):
#   ANDROID_KEYSTORE_BASE64
#   ANDROID_KEYSTORE_PASSWORD
#   ANDROID_KEY_ALIAS
#   ANDROID_KEY_PASSWORD
#
# Auto-upload to Play Console Internal Testing track also requires:
#   PLAY_SERVICE_ACCOUNT_JSON  (from Google Cloud → Service Accounts)
# When this secret is missing the upload step is skipped and the AAB
# is left as a workflow artifact for manual upload.

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "What to build"
        type: choice
        options: [debug-apk, release-aab]
        default: release-aab
      publish:
        description: "Auto-upload AAB to Play Internal Testing"
        type: boolean
        default: false
      server_url:
        description: "Optional CAPACITOR_SERVER_URL (leave blank to bundle web assets)"
        required: false
        default: ""

concurrency:
  group: build-android
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-34 build-tools;34.0.0"

      - run: pnpm install --frozen-lockfile

      - name: Build web bundle
        working-directory: packages/relay-ui
        env:
          VITE_API_BASE: https://relay-api.averrow.com
        run: pnpm exec vite build

      - name: Initialise Capacitor android project
        working-directory: packages/relay-ui
        env:
          CAPACITOR_SERVER_URL: ${{ github.event.inputs.server_url }}
        run: |
          set -euo pipefail
          if [ ! -d android ]; then
            echo "Generating android/ project (first build on this runner)"
            pnpm exec cap add android
          fi
          pnpm exec cap sync android

      - name: Bump versionCode + versionName from git
        working-directory: packages/relay-ui/android/app
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail
          # versionCode = monotonic GitHub run number; versionName from
          # the short SHA so we can trace any release AAB back to a commit.
          SHORT_SHA=$(git -C "$GITHUB_WORKSPACE" rev-parse --short HEAD)
          VC="$GITHUB_RUN_NUMBER"
          VN="0.1.0+${SHORT_SHA}"
          sed -i -E "s/(versionCode )[0-9]+/\1${VC}/" build.gradle
          sed -i -E "s/(versionName )\".*\"/\1\"${VN}\"/" build.gradle
          grep -E "versionCode|versionName" build.gradle

      - name: Decode keystore (release builds only)
        if: ${{ github.event.inputs.build_type == 'release-aab' }}
        env:
          KS_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${KS_BASE64:-}" ]; then
            echo "ERROR: ANDROID_KEYSTORE_BASE64 secret is not set. Run the 'Initialize Android upload keystore' workflow first." >&2
            exit 1
          fi
          echo "$KS_BASE64" | base64 -d > "$RUNNER_TEMP/upload-keystore.jks"
          chmod 600 "$RUNNER_TEMP/upload-keystore.jks"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/upload-keystore.jks" >> "$GITHUB_ENV"

      - name: Inject signing config into Gradle (release builds only)
        if: ${{ github.event.inputs.build_type == 'release-aab' }}
        working-directory: packages/relay-ui/android/app
        run: |
          set -euo pipefail
          # Capacitor's generated build.gradle has no signingConfig.
          # Append the overlay (under .github/) which adds a release
          # signingConfig that reads from env vars set below. Idempotent
          # via a marker comment in the overlay file.
          if ! grep -q "RELAY_SIGNING_CONFIG_INJECTED" build.gradle; then
            cat "$GITHUB_WORKSPACE/.github/android-signing-overlay.gradle" >> build.gradle
          fi

      - name: Gradle assemble debug APK
        if: ${{ github.event.inputs.build_type == 'debug-apk' }}
        working-directory: packages/relay-ui/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Gradle bundle release AAB
        if: ${{ github.event.inputs.build_type == 'release-aab' }}
        working-directory: packages/relay-ui/android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: relay-android-${{ github.event.inputs.build_type }}
          path: |
            packages/relay-ui/android/app/build/outputs/apk/**/*.apk
            packages/relay-ui/android/app/build/outputs/bundle/**/*.aab
          if-no-files-found: error
          retention-days: 14

      - name: Upload AAB to Play Console (Internal Testing)
        if: ${{ github.event.inputs.build_type == 'release-aab' && github.event.inputs.publish == 'true' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.averrow.relay
          releaseFiles: packages/relay-ui/android/app/build/outputs/bundle/release/*.aab
          track: internal
          status: draft
