name: Deploy relay-worker

on:
  push:
    branches: [main]
    paths:
      - "packages/relay-worker/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-relay-worker
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck worker
        working-directory: packages/relay-worker
        run: pnpm typecheck

      - name: Ensure DNS record (relay-api.averrow.com → proxied placeholder)
        env:
          CF_API_TOKEN: ${{ secrets.CF_RELAY_API_KEY }}
          ZONE_NAME: averrow.com
          RECORD_NAME: relay-api.averrow.com
          RECORD_TYPE: AAAA
          RECORD_CONTENT: "100::"
        run: |
          set -euo pipefail
          api="https://api.cloudflare.com/client/v4"
          auth=( -H "Authorization: Bearer ${CF_API_TOKEN}" )

          zone_id=$(curl -fsS "${api}/zones?name=${ZONE_NAME}" "${auth[@]}" \
            | jq -r '.result[0].id // empty')
          [ -n "$zone_id" ] || { echo "Zone ${ZONE_NAME} not found"; exit 1; }

          existing_id=$(curl -fsS "${api}/zones/${zone_id}/dns_records?name=${RECORD_NAME}&type=${RECORD_TYPE}" "${auth[@]}" \
            | jq -r '.result[0].id // empty')

          payload=$(jq -n \
            --arg type "${RECORD_TYPE}" \
            --arg name "${RECORD_NAME}" \
            --arg content "${RECORD_CONTENT}" \
            '{type:$type, name:$name, content:$content, proxied:true, ttl:1}')

          if [ -n "$existing_id" ]; then
            echo "Updating existing ${RECORD_TYPE} record (id=${existing_id})"
            curl -fsS -X PUT "${api}/zones/${zone_id}/dns_records/${existing_id}" \
              "${auth[@]}" -H "Content-Type: application/json" \
              --data "${payload}" | jq '.success'
          else
            echo "Creating ${RECORD_TYPE} record for ${RECORD_NAME}"
            curl -fsS -X POST "${api}/zones/${zone_id}/dns_records" \
              "${auth[@]}" -H "Content-Type: application/json" \
              --data "${payload}" | jq '.success'
          fi

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_RELAY_API_KEY }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/relay-worker
          command: deploy --env production
          secrets: |
            GOOGLE_ID
            GOOGLE_SECRET
            JWT_SECRET
        env:
          GOOGLE_ID: ${{ secrets.GOOGLE_ID }}
          GOOGLE_SECRET: ${{ secrets.GOOGLE_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
