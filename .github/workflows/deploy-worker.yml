name: Deploy relay-worker

on:
  push:
    branches: [main]
    paths:
      - "packages/relay-worker/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-relay-worker
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck worker
        working-directory: packages/relay-worker
        run: pnpm typecheck

      - name: Ensure R2 buckets exist (relay-avatars, relay-media)
        env:
          CF_API_TOKEN: ${{ secrets.CF_RELAY_API_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          api="https://api.cloudflare.com/client/v4"
          auth=( -H "Authorization: Bearer ${CF_API_TOKEN}" )
          for bucket in relay-avatars relay-media; do
            code=$(curl -fsS -o /tmp/r2.json -w "%{http_code}" \
              "${api}/accounts/${CF_ACCOUNT_ID}/r2/buckets/${bucket}" \
              "${auth[@]}" || true)
            if [ "$code" = "200" ]; then
              echo "R2 bucket ${bucket} already exists"
            else
              echo "Creating R2 bucket ${bucket}"
              curl -fsS -X POST "${api}/accounts/${CF_ACCOUNT_ID}/r2/buckets" \
                "${auth[@]}" -H "Content-Type: application/json" \
                --data "{\"name\":\"${bucket}\"}" | jq '.success'
            fi
          done

      - name: Apply D1 schema + idempotent column adds
        working-directory: packages/relay-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_RELAY_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          # CREATE TABLE IF NOT EXISTS — safe to re-run.
          pnpm exec wrangler d1 execute relay-db --remote --file=src/schema.sql

          # SQLite ALTER TABLE ADD COLUMN is not idempotent. Probe via
          # pragma_table_info and only add if missing.
          probe=$(pnpm exec wrangler d1 execute relay-db --remote --json \
            --command "SELECT name FROM pragma_table_info('users') WHERE name='is_admin';")
          if ! echo "$probe" | jq -e '.[0].results | length > 0' > /dev/null; then
            echo "Adding users.is_admin column"
            pnpm exec wrangler d1 execute relay-db --remote \
              --command "ALTER TABLE users ADD COLUMN is_admin INTEGER NOT NULL DEFAULT 0;"
          else
            echo "users.is_admin column already present"
          fi

          probe=$(pnpm exec wrangler d1 execute relay-db --remote --json \
            --command "SELECT name FROM pragma_table_info('users') WHERE name='sports_notifications';")
          if ! echo "$probe" | jq -e '.[0].results | length > 0' > /dev/null; then
            echo "Adding users.sports_notifications column"
            pnpm exec wrangler d1 execute relay-db --remote \
              --command "ALTER TABLE users ADD COLUMN sports_notifications INTEGER NOT NULL DEFAULT 1;"
          else
            echo "users.sports_notifications column already present"
          fi

          probe=$(pnpm exec wrangler d1 execute relay-db --remote --json \
            --command "SELECT name FROM pragma_table_info('messages') WHERE name='reply_to';")
          if ! echo "$probe" | jq -e '.[0].results | length > 0' > /dev/null; then
            echo "Adding messages.reply_to column"
            pnpm exec wrangler d1 execute relay-db --remote \
              --command "ALTER TABLE messages ADD COLUMN reply_to TEXT;"
          else
            echo "messages.reply_to column already present"
          fi

          probe=$(pnpm exec wrangler d1 execute relay-db --remote --json \
            --command "SELECT name FROM pragma_table_info('chat_participants') WHERE name='muted';")
          if ! echo "$probe" | jq -e '.[0].results | length > 0' > /dev/null; then
            echo "Adding chat_participants.muted column"
            pnpm exec wrangler d1 execute relay-db --remote \
              --command "ALTER TABLE chat_participants ADD COLUMN muted INTEGER NOT NULL DEFAULT 0;"
          else
            echo "chat_participants.muted column already present"
          fi

          probe=$(pnpm exec wrangler d1 execute relay-db --remote --json \
            --command "SELECT name FROM pragma_table_info('chat_participants') WHERE name='pinned_at';")
          if ! echo "$probe" | jq -e '.[0].results | length > 0' > /dev/null; then
            echo "Adding chat_participants.pinned_at column"
            pnpm exec wrangler d1 execute relay-db --remote \
              --command "ALTER TABLE chat_participants ADD COLUMN pinned_at INTEGER;"
          else
            echo "chat_participants.pinned_at column already present"
          fi

          probe=$(pnpm exec wrangler d1 execute relay-db --remote --json \
            --command "SELECT name FROM pragma_table_info('messages') WHERE name='media_url';")
          if ! echo "$probe" | jq -e '.[0].results | length > 0' > /dev/null; then
            echo "Adding messages.media_url column"
            pnpm exec wrangler d1 execute relay-db --remote \
              --command "ALTER TABLE messages ADD COLUMN media_url TEXT;"
          else
            echo "messages.media_url column already present"
          fi

          # Group avatar columns on chats. Both nullable so existing
          # rows don't need backfill — clients render the hashed-letter
          # GroupAvatar fallback whenever both are null.
          for col in avatar_url avatar_r2_key; do
            probe=$(pnpm exec wrangler d1 execute relay-db --remote --json \
              --command "SELECT name FROM pragma_table_info('chats') WHERE name='${col}';")
            if ! echo "$probe" | jq -e '.[0].results | length > 0' > /dev/null; then
              echo "Adding chats.${col} column"
              pnpm exec wrangler d1 execute relay-db --remote \
                --command "ALTER TABLE chats ADD COLUMN ${col} TEXT;"
            else
              echo "chats.${col} column already present"
            fi
          done

          # Per-event sports notification toggles. Each runs against
          # pragma_table_info so re-applying is a no-op.
          for col in sports_notify_start sports_notify_score sports_notify_final; do
            probe=$(pnpm exec wrangler d1 execute relay-db --remote --json \
              --command "SELECT name FROM pragma_table_info('users') WHERE name='${col}';")
            if ! echo "$probe" | jq -e '.[0].results | length > 0' > /dev/null; then
              echo "Adding users.${col} column"
              pnpm exec wrangler d1 execute relay-db --remote \
                --command "ALTER TABLE users ADD COLUMN ${col} INTEGER NOT NULL DEFAULT 1;"
            else
              echo "users.${col} column already present"
            fi
          done

          # user_sports_subs (per-user team subscriptions). CREATE TABLE
          # IF NOT EXISTS is itself idempotent.
          pnpm exec wrangler d1 execute relay-db --remote --command \
            "CREATE TABLE IF NOT EXISTS user_sports_subs (
               user_id TEXT NOT NULL REFERENCES users(id) ON DELETE CASCADE,
               league TEXT NOT NULL CHECK(league IN ('NHL','MLB')),
               team_key TEXT NOT NULL,
               created_at INTEGER NOT NULL,
               PRIMARY KEY (user_id, league, team_key)
             );"

          # Seed MTL + TOR subscriptions for any existing user who
          # currently has the master sports_notifications flag on. New
          # users start with no rows by default; the seed only runs
          # against the legacy population so nobody loses notifications
          # silently in the migration.
          pnpm exec wrangler d1 execute relay-db --remote --command \
            "INSERT OR IGNORE INTO user_sports_subs (user_id, league, team_key, created_at)
             SELECT id, 'NHL', 'MTL', $(date +%s)000 FROM users WHERE COALESCE(sports_notifications, 1) = 1;"
          pnpm exec wrangler d1 execute relay-db --remote --command \
            "INSERT OR IGNORE INTO user_sports_subs (user_id, league, team_key, created_at)
             SELECT id, 'MLB', '141', $(date +%s)000 FROM users WHERE COALESCE(sports_notifications, 1) = 1;"

          # Indexes that depend on the columns we may have just added.
          # CREATE INDEX IF NOT EXISTS is itself idempotent, so re-runs
          # are safe — we just couldn't put these in schema.sql because
          # that runs before the ALTERs.
          pnpm exec wrangler d1 execute relay-db --remote \
            --command "CREATE INDEX IF NOT EXISTS idx_messages_reply_to ON messages(reply_to);"
          pnpm exec wrangler d1 execute relay-db --remote \
            --command "CREATE INDEX IF NOT EXISTS idx_participants_pinned ON chat_participants(user_id, pinned_at);"
          pnpm exec wrangler d1 execute relay-db --remote \
            --command "CREATE INDEX IF NOT EXISTS idx_uss_team ON user_sports_subs(league, team_key);"

      - name: Ensure DNS record (relay-api.averrow.com → proxied placeholder)
        env:
          CF_API_TOKEN: ${{ secrets.CF_RELAY_API_KEY }}
          ZONE_NAME: averrow.com
          RECORD_NAME: relay-api.averrow.com
          RECORD_TYPE: AAAA
          RECORD_CONTENT: "100::"
        run: |
          set -euo pipefail
          api="https://api.cloudflare.com/client/v4"
          auth=( -H "Authorization: Bearer ${CF_API_TOKEN}" )

          zone_id=$(curl -fsS "${api}/zones?name=${ZONE_NAME}" "${auth[@]}" \
            | jq -r '.result[0].id // empty')
          [ -n "$zone_id" ] || { echo "Zone ${ZONE_NAME} not found"; exit 1; }

          existing_id=$(curl -fsS "${api}/zones/${zone_id}/dns_records?name=${RECORD_NAME}&type=${RECORD_TYPE}" "${auth[@]}" \
            | jq -r '.result[0].id // empty')

          payload=$(jq -n \
            --arg type "${RECORD_TYPE}" \
            --arg name "${RECORD_NAME}" \
            --arg content "${RECORD_CONTENT}" \
            '{type:$type, name:$name, content:$content, proxied:true, ttl:1}')

          if [ -n "$existing_id" ]; then
            echo "Updating existing ${RECORD_TYPE} record (id=${existing_id})"
            curl -fsS -X PUT "${api}/zones/${zone_id}/dns_records/${existing_id}" \
              "${auth[@]}" -H "Content-Type: application/json" \
              --data "${payload}" | jq '.success'
          else
            echo "Creating ${RECORD_TYPE} record for ${RECORD_NAME}"
            curl -fsS -X POST "${api}/zones/${zone_id}/dns_records" \
              "${auth[@]}" -H "Content-Type: application/json" \
              --data "${payload}" | jq '.success'
          fi

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_RELAY_API_KEY }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/relay-worker
          command: deploy --env production
          secrets: |
            GOOGLE_ID
            GOOGLE_SECRET
            JWT_SECRET
            VAPID_PUBLIC_KEY
            VAPID_PRIVATE_KEY
            VAPID_SUBJECT
        env:
          GOOGLE_ID: ${{ secrets.GOOGLE_ID }}
          GOOGLE_SECRET: ${{ secrets.GOOGLE_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          # GIF support: set GIPHY_API_KEY via
          # `wrangler secret put GIPHY_API_KEY --env production` from a
          # machine with wrangler logged in. The /gifs endpoint returns
          # 404 ("gifs_not_configured") until it's set.
