name: Deploy relay-worker

on:
  push:
    branches: [main]
    paths:
      - "packages/relay-worker/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-relay-worker
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck worker
        working-directory: packages/relay-worker
        run: pnpm typecheck

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_RELAY_API_KEY }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/relay-worker
          command: deploy --env production
          secrets: |
            GOOGLE_ID
            GOOGLE_SECRET
            JWT_SECRET
        env:
          GOOGLE_ID: ${{ secrets.GOOGLE_ID }}
          GOOGLE_SECRET: ${{ secrets.GOOGLE_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
