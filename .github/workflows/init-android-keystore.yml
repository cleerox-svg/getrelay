name: Initialize Android upload keystore

# One-shot helper that generates an Android upload keystore for signing
# release AABs. Run this once via the Actions tab (workflow_dispatch),
# copy the four values from the run log into repository Secrets:
#
#   ANDROID_KEYSTORE_BASE64
#   ANDROID_KEYSTORE_PASSWORD
#   ANDROID_KEY_ALIAS
#   ANDROID_KEY_PASSWORD
#
# After that, Build Android APK can produce signed AABs.
#
# The keystore is also uploaded as a workflow artifact (retained 7 days)
# so you can download a copy and stash it somewhere safe. If you lose the
# upload key you can still recover via Google Play Console — Play App
# Signing keeps the real signing key on Google's side.

on:
  workflow_dispatch:
    inputs:
      key_alias:
        description: "Key alias (default: relay-upload)"
        required: false
        default: "relay-upload"
      dname:
        description: "Distinguished Name (X.500 subject) for the cert"
        required: false
        default: "CN=Relay Upload, O=Averrow, C=CA"
      validity_years:
        description: "Cert validity in years (default: 50)"
        required: false
        default: "50"

jobs:
  init:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Generate keystore
        id: gen
        env:
          ALIAS: ${{ github.event.inputs.key_alias }}
          DNAME: ${{ github.event.inputs.dname }}
          VALIDITY: ${{ github.event.inputs.validity_years }}
        run: |
          set -euo pipefail
          # Random 32-char password.
          STORE_PW=$(openssl rand -base64 24 | tr -d '/+=' | cut -c1-32)
          KEY_PW="$STORE_PW"

          VALIDITY_DAYS=$(( ${VALIDITY:-50} * 365 ))

          keytool -genkeypair \
            -alias "$ALIAS" \
            -keyalg RSA \
            -keysize 4096 \
            -validity "$VALIDITY_DAYS" \
            -keystore upload-keystore.jks \
            -storepass "$STORE_PW" \
            -keypass "$KEY_PW" \
            -dname "$DNAME"

          B64=$(base64 -w0 upload-keystore.jks)

          # Write the values into the Job Summary. Step Summary has the
          # same access controls as run logs — only users with read
          # access to the repo can see it. For a private repo where you
          # are the sole admin, that's exactly the audience that should
          # see this once.
          {
            echo "## Android upload keystore generated"
            echo ""
            echo "Copy these four values into **Settings → Secrets and variables → Actions → New repository secret**:"
            echo ""
            echo "<details><summary><strong>ANDROID_KEYSTORE_BASE64</strong> (click to reveal)</summary>"
            echo ""
            echo "\`\`\`"
            echo "${B64}"
            echo "\`\`\`"
            echo ""
            echo "</details>"
            echo ""
            echo "<details><summary><strong>ANDROID_KEYSTORE_PASSWORD</strong> (click to reveal)</summary>"
            echo ""
            echo "\`\`\`"
            echo "${STORE_PW}"
            echo "\`\`\`"
            echo ""
            echo "</details>"
            echo ""
            echo "**ANDROID_KEY_ALIAS** = \`${ALIAS}\`"
            echo ""
            echo "**ANDROID_KEY_PASSWORD** = same as ANDROID_KEYSTORE_PASSWORD"
            echo ""
            echo "Then download the \`relay-upload-keystore\` artifact below and stash it somewhere safe (password manager, encrypted backup). Losing the upload keystore isn't fatal thanks to Play App Signing — Google keeps the real signing key — but having it makes future builds smoother."
          } >> "$GITHUB_STEP_SUMMARY"

          echo "Wrote secrets to the Job Summary. Open the workflow run page and scroll to the bottom."

      - name: Upload keystore artifact
        uses: actions/upload-artifact@v4
        with:
          name: relay-upload-keystore
          path: upload-keystore.jks
          if-no-files-found: error
          retention-days: 7
