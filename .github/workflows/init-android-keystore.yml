name: Initialize Android upload keystore

# One-shot helper that generates an Android upload keystore for signing
# release AABs. Run this once via the Actions tab (workflow_dispatch).
#
# Output: a single artifact `relay-upload-keystore` containing:
#   - upload-keystore.jks    (binary keystore — keep a copy in a safe place)
#   - secrets.txt            (the four values to paste into repo Secrets)
#
# After downloading the zip and opening secrets.txt, create these four
# repository secrets (Settings → Secrets and variables → Actions):
#   ANDROID_KEYSTORE_BASE64
#   ANDROID_KEYSTORE_PASSWORD
#   ANDROID_KEY_ALIAS
#   ANDROID_KEY_PASSWORD
#
# Then DELETE the local secrets.txt — those values now live in GitHub
# Secrets and shouldn't sit on disk in plaintext. The .jks file is fine
# to keep (it's useless without the password).
#
# If you lose the upload keystore you can still recover via Google Play
# Console — Play App Signing keeps the real signing key on Google's side.

on:
  workflow_dispatch:
    inputs:
      key_alias:
        description: "Key alias (default: relay-upload)"
        required: false
        default: "relay-upload"
      dname:
        description: "Distinguished Name (X.500 subject) for the cert"
        required: false
        default: "CN=Relay Upload, O=Averrow, C=CA"
      validity_years:
        description: "Cert validity in years (default: 50)"
        required: false
        default: "50"

jobs:
  init:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Generate keystore
        id: gen
        env:
          ALIAS: ${{ github.event.inputs.key_alias }}
          DNAME: ${{ github.event.inputs.dname }}
          VALIDITY: ${{ github.event.inputs.validity_years }}
        run: |
          set -euo pipefail
          # Random 32-char password.
          STORE_PW=$(openssl rand -base64 24 | tr -d '/+=' | cut -c1-32)
          KEY_PW="$STORE_PW"

          VALIDITY_DAYS=$(( ${VALIDITY:-50} * 365 ))

          keytool -genkeypair \
            -alias "$ALIAS" \
            -keyalg RSA \
            -keysize 4096 \
            -validity "$VALIDITY_DAYS" \
            -keystore upload-keystore.jks \
            -storepass "$STORE_PW" \
            -keypass "$KEY_PW" \
            -dname "$DNAME"

          B64=$(base64 -w0 upload-keystore.jks)

          # Bundle the four secret values into secrets.txt so the user
          # downloads them with the keystore artifact. Plain text, easy
          # to copy out and paste into GitHub repo Secrets.
          {
            echo "Android upload keystore — secret values"
            echo "========================================"
            echo
            echo "Paste each of these into:"
            echo "  Settings -> Secrets and variables -> Actions -> New repository secret"
            echo
            echo "----- ANDROID_KEYSTORE_BASE64 -----"
            echo "$B64"
            echo "----- end ANDROID_KEYSTORE_BASE64 -----"
            echo
            echo "ANDROID_KEYSTORE_PASSWORD = $STORE_PW"
            echo "ANDROID_KEY_ALIAS         = $ALIAS"
            echo "ANDROID_KEY_PASSWORD      = $KEY_PW"
            echo
            echo "After creating all four secrets in GitHub, delete this"
            echo "secrets.txt file. The .jks keystore file is safe to"
            echo "keep on its own — the passwords above are what protect"
            echo "it."
          } > secrets.txt

          # Also write a short Job Summary as a backup channel.
          {
            echo "## Keystore generated"
            echo
            echo "Download the **relay-upload-keystore** artifact below."
            echo "Unzip it. Open **secrets.txt** to see the four values."
          } >> "$GITHUB_STEP_SUMMARY" || true

          echo "Wrote upload-keystore.jks and secrets.txt"
          ls -la upload-keystore.jks secrets.txt

      - name: Upload keystore + secrets artifact
        uses: actions/upload-artifact@v4
        with:
          name: relay-upload-keystore
          path: |
            upload-keystore.jks
            secrets.txt
          if-no-files-found: error
          retention-days: 7
