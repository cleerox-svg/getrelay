name: Deploy relay-ui (Cloudflare Pages)

on:
  push:
    branches: [main]
    paths:
      - "packages/relay-ui/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-ui.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-relay-ui
  cancel-in-progress: false

env:
  PAGES_PROJECT: relay-ui
  CUSTOM_DOMAIN: relay.averrow.com
  ZONE_NAME: averrow.com
  VITE_API_BASE_URL: https://relay-api.averrow.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck UI
        working-directory: packages/relay-ui
        run: pnpm typecheck

      - name: Build UI (production)
        working-directory: packages/relay-ui
        env:
          VITE_API_BASE_URL: ${{ env.VITE_API_BASE_URL }}
        run: pnpm build

      - name: Ensure Pages project exists
        env:
          CF_API_TOKEN: ${{ secrets.CF_RELAY_API_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          api="https://api.cloudflare.com/client/v4"
          auth=( -H "Authorization: Bearer ${CF_API_TOKEN}" )

          http_code=$(curl -fsS -o /tmp/proj.json -w "%{http_code}" \
            "${api}/accounts/${CF_ACCOUNT_ID}/pages/projects/${PAGES_PROJECT}" \
            "${auth[@]}" || true)
          if [ "$http_code" = "200" ]; then
            echo "Pages project ${PAGES_PROJECT} exists"
          else
            echo "Creating Pages project ${PAGES_PROJECT}"
            payload=$(jq -n \
              --arg n "${PAGES_PROJECT}" \
              '{name:$n, production_branch:"main"}')
            curl -fsS -X POST \
              "${api}/accounts/${CF_ACCOUNT_ID}/pages/projects" \
              "${auth[@]}" -H "Content-Type: application/json" \
              --data "${payload}" | jq '.success'
          fi

      - name: Ensure custom domain binding (relay.averrow.com → Pages)
        env:
          CF_API_TOKEN: ${{ secrets.CF_RELAY_API_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          api="https://api.cloudflare.com/client/v4"
          auth=( -H "Authorization: Bearer ${CF_API_TOKEN}" )

          domains_json=$(curl -fsS \
            "${api}/accounts/${CF_ACCOUNT_ID}/pages/projects/${PAGES_PROJECT}/domains" \
            "${auth[@]}")

          if echo "$domains_json" | jq -e --arg d "${CUSTOM_DOMAIN}" \
              '.result[]? | select(.name == $d)' >/dev/null 2>&1; then
            echo "Custom domain ${CUSTOM_DOMAIN} already bound to ${PAGES_PROJECT}"
          else
            echo "Binding ${CUSTOM_DOMAIN} to Pages project ${PAGES_PROJECT}"
            curl -fsS -X POST \
              "${api}/accounts/${CF_ACCOUNT_ID}/pages/projects/${PAGES_PROJECT}/domains" \
              "${auth[@]}" -H "Content-Type: application/json" \
              --data "$(jq -n --arg n "${CUSTOM_DOMAIN}" '{name:$n}')" | jq '.success'
          fi

      - name: Diagnose — does the zone's account match CLOUDFLARE_ACCOUNT_ID?
        env:
          CF_API_TOKEN: ${{ secrets.CF_RELAY_API_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          api="https://api.cloudflare.com/client/v4"
          auth=( -H "Authorization: Bearer ${CF_API_TOKEN}" )

          zone_json=$(curl -fsS "${api}/zones?name=${ZONE_NAME}" "${auth[@]}")
          zone_account=$(echo "$zone_json" | jq -r '.result[0].account.id // empty')
          echo "Zone (${ZONE_NAME}) account.id : ${zone_account}"
          echo "Workflow CLOUDFLARE_ACCOUNT_ID : ${CF_ACCOUNT_ID}"
          if [ -n "$zone_account" ] && [ "$zone_account" != "$CF_ACCOUNT_ID" ]; then
            echo "::warning::Zone is in a different Cloudflare account than the Pages project."
            echo "::warning::This will trigger Error 1014 (CNAME cross-user banned) at request time."
            echo "::warning::Fix by moving the zone or the Pages project so both live in the same account."
          else
            echo "OK — zone and Pages project share account ${CF_ACCOUNT_ID}"
          fi

      - name: Ensure DNS CNAME (relay → project's actual *.pages.dev, proxied)
        env:
          CF_API_TOKEN: ${{ secrets.CF_RELAY_API_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          api="https://api.cloudflare.com/client/v4"
          auth=( -H "Authorization: Bearer ${CF_API_TOKEN}" )

          # The project name in our account is ${PAGES_PROJECT}, but the
          # *.pages.dev hostname is allocated from a single global namespace
          # and may have been suffixed (e.g. relay-ui-ani.pages.dev) when the
          # bare name was already taken. Always source the real hostname
          # from the Pages API, never assume it.
          project_json=$(curl -fsS \
            "${api}/accounts/${CF_ACCOUNT_ID}/pages/projects/${PAGES_PROJECT}" \
            "${auth[@]}")
          record_target=$(echo "$project_json" | jq -r '.result.subdomain // empty')
          if [ -z "$record_target" ]; then
            echo "Could not read .result.subdomain from Pages project response"; exit 1
          fi
          echo "Pages project ${PAGES_PROJECT} hostname: ${record_target}"

          zone_id=$(curl -fsS "${api}/zones?name=${ZONE_NAME}" "${auth[@]}" \
            | jq -r '.result[0].id // empty')
          [ -n "$zone_id" ] || { echo "Zone ${ZONE_NAME} not found"; exit 1; }

          records_json=$(curl -fsS \
            "${api}/zones/${zone_id}/dns_records?name=${CUSTOM_DOMAIN}" \
            "${auth[@]}")
          count=$(echo "$records_json" | jq -r '.result | length')

          payload=$(jq -n \
            --arg name "${CUSTOM_DOMAIN}" \
            --arg content "${record_target}" \
            '{type:"CNAME", name:$name, content:$content, proxied:true, ttl:1}')

          if [ "$count" = "0" ]; then
            echo "Creating CNAME ${CUSTOM_DOMAIN} → ${record_target}"
            curl -fsS -X POST "${api}/zones/${zone_id}/dns_records" \
              "${auth[@]}" -H "Content-Type: application/json" \
              --data "${payload}" | jq '.success'
            exit 0
          fi

          # If any existing record already points at the right hostname,
          # leave it alone (covers both manual and Pages-managed records).
          # Otherwise replace whatever's there with the correct target.
          existing_id=$(echo "$records_json" | jq -r '.result[0].id')
          existing_type=$(echo "$records_json" | jq -r '.result[0].type')
          existing_content=$(echo "$records_json" | jq -r '.result[0].content')

          if [ "$existing_type" = "CNAME" ] && [ "$existing_content" = "$record_target" ]; then
            echo "CNAME ${CUSTOM_DOMAIN} → ${record_target} already in place"
            exit 0
          fi

          echo "Replacing stale record (${existing_type} → ${existing_content}) with CNAME → ${record_target}"
          curl -fsS -X PUT "${api}/zones/${zone_id}/dns_records/${existing_id}" \
            "${auth[@]}" -H "Content-Type: application/json" \
            --data "${payload}" | jq '.success'

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_RELAY_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          # Reuse wrangler from relay-worker's devDeps (already installed
          # by `pnpm install --frozen-lockfile` above). Avoids
          # cloudflare/wrangler-action's own `npm install`, which trips
          # over the root package.json's `workspaces` field in a pnpm tree.
          pnpm --filter @relay/worker exec wrangler pages deploy \
            "${GITHUB_WORKSPACE}/packages/relay-ui/dist" \
            --project-name="${PAGES_PROJECT}" \
            --branch=main \
            --commit-dirty=true
